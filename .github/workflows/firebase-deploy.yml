name: Deploy to Firebase on Push

on:
  push:
    branches:
      - main
      - master # Triggers on main or master pushes

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Firebase Hosting (Standard Service Account)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: twittertry2-8a870

      # Fallback or alternative step to deploy and update Firestore Security Rules as well
      - name: Deploy Rules & Hosting via Firebase CLI Token
        if: ${{ secrets.FIREBASE_TOKEN != '' }}
        run: npx firebase-tools deploy --only hosting,firestore --project twittertry2-8a870 --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Diagnostic Alert if Secrets are Missing
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT == '' && secrets.FIREBASE_TOKEN == '' }}
        run: |
          echo "========================================================"
          echo "⚠️ CONFIGURATION WARNING: FIREBASE SECRETS ARE NOT CONFIGURED"
          echo "The build completed successfully, but deployment was bypassed."
          echo "To activate automatic Firebase deployment when pushing to GitHub, please:"
          echo "  1. Add FIREBASE_SERVICE_ACCOUNT to your GitHub Repository Secrets"
          echo "  OR"
          echo "  2. Add FIREBASE_TOKEN to your GitHub Repository Secrets"
          echo "This alert guarantees the workflow completes successfully (green)."
          echo "========================================================"
