name: Deploy to Firebase on Push

on:
  push:
    branches:
      - main
      - master # Triggers on main or master pushes

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      SA_EXISTS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      TOKEN_EXISTS: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create Version Tag
        run: |
          echo "export const versionInfo = { version: '1.0.${{ github.run_number }}', sha: '$(echo "${{ github.sha }}" | cut -c1-7)', timestamp: '$(date -u +'%Y-%m-%dT%H:%M:%SZ')' };" > src/version.ts

      - name: Create Environment File
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "APP_URL=https://twittertry2-8a870.web.app" >> .env

      - name: Build Application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Authenticate to Google Cloud
        if: ${{ env.SA_EXISTS != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase via Service Account (Hosting, Firestore, Functions)
        if: ${{ env.SA_EXISTS != '' }}
        run: npx firebase-tools deploy --project twittertry2-8a870 --force

      # Fallback or alternative step to deploy using Firebase Token
      - name: Deploy via Firebase CLI Token
        if: ${{ env.TOKEN_EXISTS != '' && env.SA_EXISTS == '' }}
        run: npx firebase-tools deploy --project twittertry2-8a870 --token "$FIREBASE_TOKEN" --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Diagnostic Alert if Secrets are Missing
        if: ${{ env.SA_EXISTS == '' && env.TOKEN_EXISTS == '' }}
        run: |
          echo "========================================================"
          echo "⚠️ CONFIGURATION WARNING: FIREBASE SECRETS ARE NOT CONFIGURED"
          echo "The build completed successfully, but deployment was bypassed."
          echo "To activate automatic Firebase deployment when pushing to GitHub, please:"
          echo "  1. Add FIREBASE_SERVICE_ACCOUNT to your GitHub Repository Secrets"
          echo "  OR"
          echo "  2. Add FIREBASE_TOKEN to your GitHub Repository Secrets"
          echo "This alert guarantees the workflow completes successfully (green)."
          echo "========================================================"
